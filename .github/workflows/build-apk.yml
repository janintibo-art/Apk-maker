name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Localiser le projet (extrait un .zip si besoin)
        id: proj
        run: |
          set -e
          if [ ! -f settings.gradle.kts ] && ls *.zip >/dev/null 2>&1; then
            for z in *.zip; do echo "Extraction de $z"; unzip -o "$z" >/dev/null; done
          fi
          F="$(find . -maxdepth 4 -name settings.gradle.kts | head -n1)"
          if [ -z "$F" ]; then
            echo "::error::settings.gradle.kts introuvable (projet Gradle absent)."
            exit 1
          fi
          DIR="$(dirname "$F")"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Projet détecté dans : $DIR"

      - name: Installer le JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer le SDK Android (licences acceptées)
        uses: android-actions/setup-android@v3

      - name: Installer Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Construire l'APK debug
        working-directory: ${{ steps.proj.outputs.dir }}
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Publier l'APK (artifact téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Joindre l'APK à la Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
